<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUS + Organizado — Apresentação</title>
    <style>
        /* ============================================================
           RESET E CONFIGURAÇÕES GLOBAIS
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --verde: #00ff41;
            --verde-glow: rgba(0, 255, 65, 0.6);
            --verde-glow-strong: rgba(0, 255, 65, 0.9);
            --preto: #0a0a0a;
            --cinza-escuro: #1a1a1a;
            --cinza-medio: #2a2a2a;
            --metal-claro: #8a8a8a;
            --branco: #e8e8e8;
            --vermelho: #ff1744;
            --amarelo: #ffea00;
            --font-mono: 'Courier New', monospace;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            font-family: var(--font-mono);
            background: var(--preto);
            color: var(--branco);
            overflow-x: hidden;
            line-height: 1.6;
            min-height: 100vh;
            position: relative;
        }

        /* ============================================================
           SCANLINES (efeito CRT)
           ============================================================ */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(0deg,
                    rgba(0, 0, 0, 0.03) 0px,
                    rgba(0, 0, 0, 0.03) 2px,
                    transparent 2px,
                    transparent 6px);
            z-index: 9999;
            animation: scanlines 10s linear infinite;
        }

        @keyframes scanlines {
            0% { background-position: 0 0; }
            100% { background-position: 0 30px; }
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.5) 100%);
            z-index: 9998;
        }

        /* ============================================================
           PARTÍCULAS
           ============================================================ */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: var(--verde);
            border-radius: 50%;
            opacity: 0;
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            0% { opacity: 0; transform: translateY(100vh) scale(0); }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { opacity: 0; transform: translateY(-10vh) scale(1); }
        }

        /* ============================================================
           HUD (fixo no canto inferior esquerdo)
           ============================================================ */
        .hud {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            font-size: 10px;
            color: var(--verde);
            background: rgba(0,0,0,0.85);
            padding: 10px 14px;
            border: 1px solid var(--verde);
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(0,255,65,0.15);
            backdrop-filter: blur(6px);
            display: flex;
            flex-direction: column;
            gap: 2px;
            letter-spacing: 1px;
            text-transform: uppercase;
            pointer-events: none;
            min-width: 130px;
        }

        .hud .linha {
            display: flex;
            justify-content: space-between;
            gap: 16px;
        }
        .hud .valor {
            color: #fff;
        }
        .hud .rotulo {
            color: #6b6b6b;
        }
        .hud .valor.aviso {
            color: var(--amarelo);
        }
        .hud .valor.perigo {
            color: var(--vermelho);
        }

        /* ============================================================
           HEADER E NAVEGAÇÃO
           ============================================================ */
        .header {
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--verde);
            box-shadow: 0 0 40px var(--verde-glow);
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            transition: box-shadow 0.5s;
        }

        .header.scrolled {
            box-shadow: 0 0 60px var(--verde-glow-strong);
        }

        .header-inner {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 2px;
            color: var(--branco);
            text-transform: uppercase;
        }

        .logo-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: var(--verde);
            color: var(--preto);
            border-radius: 4px;
            font-size: 1.4rem;
            font-weight: bold;
            box-shadow: 0 0 30px var(--verde-glow);
            transition: 0.3s;
            animation: pulseIcon 2s infinite;
        }

        @keyframes pulseIcon {
            0%, 100% { box-shadow: 0 0 30px var(--verde-glow); }
            50% { box-shadow: 0 0 60px var(--verde-glow-strong); }
        }

        .logo span {
            color: var(--verde);
            text-shadow: 0 0 20px var(--verde-glow);
        }

        .nav {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--metal-claro);
            padding: 6px 16px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            font-family: var(--font-mono);
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
            position: relative;
        }

        .nav-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: var(--verde-glow);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
            z-index: -1;
        }

        .nav-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .nav-btn:hover {
            color: var(--branco);
            border-color: var(--verde);
            box-shadow: 0 0 20px var(--verde-glow);
            transform: translateY(-2px);
        }

        .nav-btn.active {
            color: var(--preto);
            background: var(--verde);
            border-color: var(--verde);
            box-shadow: 0 0 30px var(--verde-glow-strong);
            font-weight: 600;
        }

        /* ============================================================
           BANNER DO DESAFIO
           ============================================================ */
        .banner {
            background: linear-gradient(135deg, rgba(0,255,65,0.08) 0%, rgba(0,0,0,0.95) 100%);
            border-bottom: 1px solid var(--verde);
            padding: 10px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 60px var(--verde-glow);
        }

        .banner::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, var(--verde-glow), transparent 70%);
            animation: pulseBanner 3s infinite;
        }

        @keyframes pulseBanner {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }

        .banner-content {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .badge-desafio {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,255,65,0.1);
            border: 1px solid var(--verde);
            padding: 5px 18px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--verde);
            text-shadow: 0 0 20px var(--verde-glow);
            box-shadow: 0 0 30px var(--verde-glow);
            animation: badgePulse 2s infinite;
        }

        @keyframes badgePulse {
            0%, 100% { box-shadow: 0 0 30px var(--verde-glow); }
            50% { box-shadow: 0 0 60px var(--verde-glow-strong); }
        }

        .badge-desafio .icone {
            font-size: 1.2rem;
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .badge-ano {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--cinza-medio);
            padding: 4px 14px;
            border-radius: 4px;
            font-size: 0.7rem;
            color: var(--metal-claro);
        }

        .badge-ano strong {
            color: var(--branco);
        }

        /* ============================================================
           CONTEÚDO PRINCIPAL
           ============================================================ */
        .main {
            max-width: 1280px;
            margin: 0 auto;
            padding: 30px 24px 50px;
            position: relative;
            z-index: 1;
        }

        /* ============================================================
           PÁGINAS (cada aba)
           ============================================================ */
        .page {
            display: none;
            animation: fadeIn 0.6s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .page-titulo {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--branco);
            margin-bottom: 6px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 40px var(--verde-glow);
            animation: tituloGlow 3s infinite;
        }

        @keyframes tituloGlow {
            0%, 100% { text-shadow: 0 0 40px var(--verde-glow); }
            50% { text-shadow: 0 0 80px var(--verde-glow-strong); }
        }

        .page-titulo::after {
            content: '';
            display: block;
            width: 50px;
            height: 3px;
            background: var(--verde);
            margin-top: 6px;
            box-shadow: 0 0 30px var(--verde-glow);
        }

        .page-subtitulo {
            color: var(--metal-claro);
            font-size: 1rem;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        /* ============================================================
           CARDS
           ============================================================ */
        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 18px;
            margin: 18px 0;
        }

        .card {
            background: var(--cinza-escuro);
            border: 1px solid var(--cinza-medio);
            border-radius: 8px;
            padding: 18px;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(45deg, var(--verde), transparent, var(--verde));
            opacity: 0;
            transition: 0.5s;
            border-radius: 8px;
            z-index: -1;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--verde);
            box-shadow: 0 0 40px var(--verde-glow);
        }

        .card:hover::before {
            opacity: 0.15;
        }

        .card .icone {
            font-size: 1.8rem;
            margin-bottom: 8px;
            display: block;
        }

        .card h3 {
            font-size: 1rem;
            color: var(--branco);
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        .card p,
        .card li {
            color: var(--metal-claro);
            font-size: 0.85rem;
        }

        .card ul {
            list-style: none;
            padding: 0;
            margin-top: 6px;
        }
        .card ul li::before {
            content: "▸ ";
            color: var(--verde);
        }

        /* ============================================================
           CARDS DE RISCO (cores)
           ============================================================ */
        .grid-risco {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin: 20px 0;
        }

        .card-risco {
            background: var(--cinza-escuro);
            border-top: 4px solid #666;
            border-radius: 4px;
            padding: 14px;
            transition: 0.4s;
        }

        .card-risco:hover {
            transform: translateY(-4px);
            border-color: var(--verde);
            box-shadow: 0 0 30px var(--verde-glow);
        }

        .card-risco.preto { border-top-color: #1a1a1a; }
        .card-risco.vermelho { border-top-color: var(--vermelho); }
        .card-risco.amarelo { border-top-color: var(--amarelo); }
        .card-risco.verde { border-top-color: var(--verde); }

        .risco-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .risco-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
        }
        .risco-dot.preto { background: #1a1a1a; }
        .risco-dot.vermelho { background: var(--vermelho); }
        .risco-dot.amarelo { background: var(--amarelo); }
        .risco-dot.verde { background: var(--verde); }

        .risco-nome {
            font-weight: 700;
            color: var(--branco);
            font-size: 1rem;
        }

        .risco-prioridade {
            margin-left: auto;
            color: var(--metal-claro);
            font-size: 0.8rem;
        }

        .risco-exemplos {
            list-style: none;
            padding: 0;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 6px;
        }

        .risco-exemplos li {
            background: rgba(255,255,255,0.03);
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 0.7rem;
            color: var(--metal-claro);
            border: 1px solid var(--cinza-medio);
        }

        /* ============================================================
           DESTAQUE (caixa de destaque)
           ============================================================ */
        .destaque {
            background: var(--cinza-escuro);
            border-left: 4px solid var(--verde);
            padding: 14px 18px;
            border-radius: 4px;
            box-shadow: 0 0 30px var(--verde-glow);
            margin: 18px 0;
            color: var(--branco);
            font-weight: 500;
            font-size: 1rem;
            animation: destaquePulse 3s infinite;
        }

        @keyframes destaquePulse {
            0%, 100% { box-shadow: 0 0 30px var(--verde-glow); }
            50% { box-shadow: 0 0 60px var(--verde-glow-strong); }
        }

        .destaque strong {
            color: var(--verde);
            text-shadow: 0 0 20px var(--verde-glow);
        }

        /* ============================================================
           RODAPÉ
           ============================================================ */
        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--cinza-medio);
            color: var(--metal-claro);
            font-size: 0.75rem;
        }

        .footer::before {
            content: '';
            display: block;
            width: 100px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--verde), transparent);
            margin: 0 auto 12px;
        }

        .footer strong {
            color: var(--verde);
        }

        /* ============================================================
           RESPONSIVIDADE
           ============================================================ */
        @media (max-width: 900px) {
            .header-inner {
                flex-wrap: wrap;
                height: auto;
                padding: 12px 0;
            }
            .logo {
                font-size: 0.95rem;
            }
            .menu-toggle {
                display: flex;
                flex-direction: column;
                gap: 4px;
                background: transparent;
                border: none;
                cursor: pointer;
                padding: 4px;
            }
            .menu-toggle span {
                display: block;
                width: 26px;
                height: 2px;
                background: var(--branco);
                border-radius: 2px;
                transition: 0.3s;
            }
            .menu-toggle.open span:nth-child(1) {
                transform: rotate(45deg) translate(5px, 5px);
                background: var(--verde);
            }
            .menu-toggle.open span:nth-child(2) {
                opacity: 0;
            }
            .menu-toggle.open span:nth-child(3) {
                transform: rotate(-45deg) translate(5px, -5px);
                background: var(--verde);
            }

                display: none;
                width: 100%;
                flex-direction: column;
                align-items: stretch;
                gap: 4px;
                padding: 10px 0 4px;
                border-top: 1px solid var(--cinza-medio);
            }

                display: flex;
