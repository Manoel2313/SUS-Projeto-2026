<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUS + Organizado — Apresentação</title>
    <style>
        /* ======================================================================= */
        /*  RESET E CONFIGURAÇÕES GLOBAIS                                           */
        /* ======================================================================= */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root {
            --verde: #00ff41;
            --verde-escuro: #00cc33;
            --verde-glow: rgba(0, 255, 65, 0.6);
            --verde-glow-strong: rgba(0, 255, 65, 0.9);
            --preto: #0a0a0a;
            --cinza-escuro: #1a1a1a;
            --cinza-medio: #2a2a2a;
            --cinza-claro: #3a3a3a;
            --metal: #6b6b6b;
            --metal-claro: #8a8a8a;
            --branco: #e8e8e8;
            --vermelho: #ff1744;
            --vermelho-glow: rgba(255, 23, 68, 0.4);
            --amarelo: #ffea00;
            --amarelo-glow: rgba(255, 234, 0, 0.4);
            --font-mono: 'Share Tech Mono', 'Courier New', monospace;
            --radius: 8px;
            --transicao-padrao: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            font-family: var(--font-mono);
            background: var(--preto);
            color: var(--branco);
            overflow-x: hidden;
            line-height: 1.7;
            position: relative;
            min-height: 100vh;
        }

        /* ===== SCANLINES ===== */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(0deg,
                    rgba(0, 0, 0, 0.03) 0px,
                    rgba(0, 0, 0, 0.03) 2px,
                    transparent 2px,
                    transparent 6px);
            z-index: 9999;
            animation: scanlines-move 10s linear infinite;
        }

        @keyframes scanlines-move {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: 0 30px;
            }
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(0, 0, 0, 0.5) 100%);
            z-index: 9998;
        }

        /* ===== PARTICLES ===== */
        .particle-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: var(--verde);
            border-radius: 50%;
            opacity: 0;
            animation: particleFloat linear infinite;
        }

        @keyframes particleFloat {
            0% {
                opacity: 0;
                transform: translateY(100vh) scale(0);
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                opacity: 0;
                transform: translateY(-10vh) scale(1);
            }
        }

        /* ===== HUD ===== */
        .system-hud {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            font-size: 10px;
            color: var(--verde);
            background: rgba(0, 0, 0, 0.85);
            padding: 10px 16px;
            border: 1px solid var(--verde);
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.15);
            backdrop-filter: blur(6px);
            display: flex;
            flex-direction: column;
            gap: 2px;
            letter-spacing: 1px;
            text-transform: uppercase;
            pointer-events: none;
            min-width: 140px;
        }
        .system-hud .line {
            display: flex;
            justify-content: space-between;
            gap: 16px;
        }
        .system-hud .value {
            color: #fff;
        }
        .system-hud .label {
            color: var(--metal);
        }
        .system-hud .value.warning {
            color: var(--amarelo);
        }
        .system-hud .value.danger {
            color: var(--vermelho);
        }

        /* ===== HEADER ===== */
        .header {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--verde);
            box-shadow: 0 0 40px var(--verde-glow);
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: all 0.5s ease;
        }

        .header.scrolled {
            box-shadow: 0 0 60px var(--verde-glow-strong);
        }

        .header-inner {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 2px;
            flex-shrink: 0;
            color: var(--branco);
            text-transform: uppercase;
        }

        .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: var(--verde);
            color: var(--preto);
            border-radius: 4px;
            font-size: 1.4rem;
            font-weight: bold;
            box-shadow: 0 0 30px var(--verde-glow);
            transition: var(--transicao-padrao);
            animation: pulseIcon 2s ease-in-out infinite;
        }

        @keyframes pulseIcon {
            0%,
            100% {
                box-shadow: 0 0 30px var(--verde-glow);
            }
            50% {
                box-shadow: 0 0 60px var(--verde-glow-strong);
            }
        }

        .logo-icon:hover {
            transform: scale(1.1) rotate(-5deg);
            box-shadow: 0 0 50px var(--verde-glow-strong);
        }

        .logo span {
            color: var(--verde);
            text-shadow: 0 0 20px var(--verde-glow);
        }

        /* ===== NAV ===== */
        .nav {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--metal-claro);
            padding: 6px 16px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: var(--font-mono);
            white-space: nowrap;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: var(--verde-glow);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
            z-index: -1;
        }

        .nav-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .nav-btn:hover {
            color: var(--branco);
            border-color: var(--verde);
            box-shadow: 0 0 20px var(--verde-glow);
            transform: translateY(-2px);
        }

        .nav-btn.active {
            color: var(--preto);
            background: var(--verde);
            border-color: var(--verde);
            box-shadow: 0 0 30px var(--verde-glow-strong);
            font-weight: 600;
            animation: btnActive 0.6s ease;
        }

        @keyframes btnActive {
            0% {
                transform: scale(0.8);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }

        .nav-btn.active:hover {
            box-shadow: 0 0 50px var(--verde-glow-strong);
            transform: scale(1.02);
        }

        /* ===== MOBILE MENU ===== */
        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 6px;
            transition: all 0.3s ease;
        }
        .menu-toggle:hover span {
            background: var(--verde);
        }
        .menu-toggle span {
            display: block;
            width: 28px;
            height: 2.5px;
            background: var(--branco);
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        .menu-toggle.open span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
            background: var(--verde);
        }
        .menu-toggle.open span:nth-child(2) {
            opacity: 0;
            transform: scaleX(0);
        }
        .menu-toggle.open span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
            background: var(--verde);
        }

        /* ===== BANNER ===== */
        .challenge-banner {
            background: linear-gradient(135deg, rgba(0, 255, 65, 0.08) 0%, rgba(0, 0, 0, 0.9) 100%);
            border-bottom: 1px solid var(--verde);
            padding: 10px 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 60px var(--verde-glow);
        }

        .challenge-banner::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, var(--verde-glow), transparent 70%);
            animation: pulseGlow 3s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%,
            100% {
                opacity: 0.2;
                transform: scale(1);
            }
            50% {
                opacity: 0.6;
                transform: scale(1.1);
            }
        }

        .challenge-banner-content {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .challenge-banner .badge-challenge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 255, 65, 0.1);
            border: 1px solid var(--verde);
            padding: 5px 18px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--verde);
            text-shadow: 0 0 20px var(--verde-glow);
            box-shadow: 0 0 30px var(--verde-glow);
            animation: badgePulse 2s ease-in-out infinite;
        }

        @keyframes badgePulse {
            0%,
            100% {
                box-shadow: 0 0 30px var(--verde-glow);
            }
            50% {
                box-shadow: 0 0 60px var(--verde-glow-strong);
            }
        }

        .challenge-banner .badge-challenge .icon {
            font-size: 1.2rem;
            animation: spinIcon 4s linear infinite;
        }

        @keyframes spinIcon {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .challenge-banner .badge-year {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--cinza-medio);
            padding: 4px 14px;
            border-radius: 4px;
            font-size: 0.7rem;
            color: var(--metal-claro);
            transition: all 0.3s ease;
        }

        .challenge-banner .badge-year:hover {
            border-color: var(--verde);
            box-shadow: 0 0 20px var(--verde-glow);
        }

        .challenge-banner .badge-year strong {
            color: var(--branco);
        }

        /* ===== MAIN ===== */
        .main {
            flex: 1;
            max-width: 1280px;
            margin: 0 auto;
            padding: 30px 24px 50px;
            width: 100%;
        }

        /* ===== PAGES ===== */
        .page {
            display: none;
            position: relative;
        }

        .page.active {
            display: block;
            animation: pageEnter 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .page.exit {
            animation: pageExit 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes pageEnter {
            0% {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
                filter: blur(10px);
            }
            50% {
                opacity: 0.5;
                transform: translateY(10px) scale(0.98);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        @keyframes pageExit {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-30px) scale(0.95);
                filter: blur(5px);
            }
        }

        /* ===== TYPOGRAPHY ===== */
        .page-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--branco);
            margin-bottom: 6px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 40px var(--verde-glow);
            animation: titleGlow 3s ease-in-out infinite;
            font-family: var(--font-mono);
        }

        @keyframes titleGlow {
            0%,
            100% {
                text-shadow: 0 0 40px var(--verde-glow);
            }
            50% {
                text-shadow: 0 0 80px var(--verde-glow-strong);
            }
        }

        .page-title::after {
            content: '';
            display: block;
            width: 50px;
            height: 3px;
            background: var(--verde);
            margin-top: 6px;
            box-shadow: 0 0 30px var(--verde-glow);
            animation: lineExpand 1s ease forwards;
        }

        @keyframes lineExpand {
            0% {
                width: 0;
            }
            100% {
                width: 50px;
            }
        }

        .page-subtitle {
            font-size: 1rem;
            color: var(--metal-claro);
            margin-bottom: 20px;
            font-weight: 300;
            animation: subtitleFade 0.8s ease 0.3s both;
            letter-spacing: 1px;
        }

        @keyframes subtitleFade {
            0% {
                opacity: 0;
                transform: translateX(-20px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* ===== CARDS ===== */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
            margin: 18px 0;
        }

        .card {
            background: var(--cinza-escuro);
            border-radius: var(--radius);
            padding: 20px;
            border: 1px solid var(--cinza-medio);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            cursor: default;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--verde), transparent, var(--verde));
            opacity: 0;
            transition: all 0.5s ease;
            border-radius: var(--radius);
            z-index: -1;
        }

        .card:hover {
            transform: translateY(-4px) scale(1.02);
            border-color: var(--verde);
            box-shadow: 0 0 40px var(--verde-glow);
        }

        .card:hover::before {
            opacity: 0.15;
        }

        .card-icon {
            font-size: 1.8rem;
            margin-bottom: 10px;
            display: block;
        }

        .card h3 {
            font-size: 1rem;
            color: var(--branco);
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .card p,
        .card li {
            color: var(--metal-claro);
            font-size: 0.85rem;
        }

        .card ul {
            list-style: none;
            padding: 0;
            margin-top: 6px;
        }

        .card ul li::before {
            content: '▸ ';
            color: var(--verde);
        }

        /* ===== HIGHLIGHT ===== */
        .highlight-box {
            background: var(--cinza-escuro);
            border-left: 4px solid var(--verde);
            padding: 16px 20px;
            border-radius: var(--radius);
            box-shadow: 0 0 30px var(--verde-glow);
            margin: 18px 0;
            font-weight: 500;
            font-size: 1rem;
            color: var(--branco);
            position: relative;
            overflow: hidden;
            animation: highlightPulse 3s ease-in-out infinite;
        }

        @keyframes highlightPulse {
            0%,
            100% {
                box-shadow: 0 0 30px var(--verde-glow);
            }
            50% {
                box-shadow: 0 0 60px var(--verde-glow-strong);
            }
        }

        .highlight-box strong {
            color: var(--verde);
            text-shadow: 0 0 20px var(--verde-glow);
        }

        /* ===== RISK CARDS (simplificados) ===== */
        .risk-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 18px;
            margin: 20px 0;
        }

        .risk-card {
            background: var(--cinza-escuro);
            border-radius: var(--radius);
            padding: 18px;
            border: 1px solid var(--cinza-medio);
            border-top: 4px solid var(--metal);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .risk-card:hover {
            transform: translateY(-4px) scale(1.02);
            border-color: var(--verde);
            box-shadow: 0 0 40px var(--verde-glow);
        }

        .risk-card.black {
            border-top-color: #1a1a1a;
        }
        .risk-card.red {
            border-top-color: var(--vermelho);
        }
        .risk-card.yellow {
            border-top-color: var(--amarelo);
